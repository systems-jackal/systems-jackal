name: Auto-update Projects

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from GitHub

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch repos and update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: systems-jackal
        run: |
          node << 'EOF'
          const https = require("https");
          const fs = require("fs");

          const username = process.env.GH_USERNAME;
          const token = process.env.GH_TOKEN;

          function fetchRepos() {
            return new Promise((resolve, reject) => {
              const options = {
                hostname: "api.github.com",
                path: `/users/${username}/repos?sort=updated&per_page=20&type=public`,
                headers: {
                  "User-Agent": "readme-bot",
                  Authorization: `Bearer ${token}`,
                  Accept: "application/vnd.github+json",
                },
              };

              https.get(options, (res) => {
                let data = "";
                res.on("data", (chunk) => (data += chunk));
                res.on("end", () => resolve(JSON.parse(data)));
              }).on("error", reject);
            });
          }

          async function run() {
            const repos = await fetchRepos();

            // Skip the profile repo itself and forks
            const filtered = repos.filter(
              (r) => !r.fork && r.name !== username
            );

            if (filtered.length === 0) {
              console.log("No public repos found — skipping update.");
              return;
            }

            const lines = filtered.map((repo) => {
              const desc = repo.description
                ? `\n  > ${repo.description}`
                : "";
              const lang = repo.language ? ` · \`${repo.language}\`` : "";
              const stars =
                repo.stargazers_count > 0
                  ? ` · ⭐ ${repo.stargazers_count}`
                  : "";
              const updated = new Date(repo.updated_at).toLocaleDateString(
                "en-GB",
                { day: "numeric", month: "short", year: "numeric" }
              );

              return `### [${repo.name}](${repo.html_url})${desc}\n  ${lang}${stars} · Updated ${updated}`;
            });

            const block = lines.join("\n\n");

            const readme = fs.readFileSync("README.md", "utf8");
            const updated = readme.replace(
              /<!-- REPOS-START -->[\s\S]*?<!-- REPOS-END -->/,
              `<!-- REPOS-START -->\n<!-- This section is auto-generated by GitHub Actions — do not edit manually -->\n\n${block}\n\n<!-- REPOS-END -->`
            );

            fs.writeFileSync("README.md", updated);
            console.log(`Updated README with ${filtered.length} repo(s).`);
          }

          run().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-update projects list"
          git push
